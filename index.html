<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VelvetCash</title>
<style>
/* Font internet se aayega */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', Arial, sans-serif; }

body {
  background: linear-gradient(135deg, #ecfdf5, #d1fae5);
  color: #064e3b;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

.hero { text-align: center; padding: 40px 20px 10px; }
.hero h1 { font-size: 40px; color: #16a34a; font-weight: 700; }
.hero p { color: #065f46; font-size: 14px; margin-top: 5px; }

.launch-container { margin: 20px auto; width: 90%; max-width: 320px; text-align: center; }
.launch-img { 
  width: 100%; 
  border-radius: 20px; 
  box-shadow: 0 10px 30px rgba(22,163,74,0.3);
  animation: float 2.5s infinite ease-in-out;
}
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

/* TERI ORIGINAL BUTTON STYLING WAPIS */
.buttons-container { display: flex; flex-direction: column; gap: 12px; width: 90%; max-width: 400px; margin-bottom: 20px; }
.btn {
  padding: 16px;
  border-radius: 12px;
  background: linear-gradient(45deg,#22c55e,#86efac);
  color: #064e3b;
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  border: none;
  box-shadow: 0 4px 15px rgba(34,197,94,0.2);
  transition: transform 0.1s ease;
}
.btn:active { transform: scale(0.92); }

.features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; max-width: 400px; padding-bottom: 30px; }
.feature-box { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(22,163,74,0.1); text-align: center; font-size: 13px; font-weight: 600; }

.popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
.popup-box { background: white; padding: 30px; border-radius: 20px; width: 80%; max-width: 320px; text-align: center; animation: pop 0.3s ease; }
@keyframes pop { from {transform: scale(0.8); opacity:0;} to {transform: scale(1); opacity:1;} }
.popup button { margin-top: 20px; padding: 10px 25px; background: #22c55e; color: white; border: none; border-radius: 10px; font-weight: bold; }

.footer { padding: 20px; font-size: 11px; color: #065f46; opacity: 0.6; }
</style>
</head>
<body>

<div class="hero">
  <h1>VelvetCash</h1>
  <p>India's Next Big Earning Platform 💸</p>
</div>

<div class="launch-container">
  <!-- AB YE TERI FOLDER WALI PHOTO UTHAYEGA -->
  <div class="launch-container">
  <img src="launch.jpg" class="launch-img" alt="Launching 2027" onclick="showPopup('launch')">
</div>

</div>

<div class="buttons-container">
  <div class="btn" onclick="showPopup('about')">ℹ️ About App</div>
  <div class="btn" onclick="showPopup('features')">✨ Features</div>
  <div class="btn" onclick="showPopup('notify')">🔔 Notify Me</div>
</div>

<div class="features-grid">
  <div class="feature-box">💰 Daily Rewards</div>
  <div class="feature-box">📲 Instant Withdraw</div>
  <div class="feature-box">🎮 Simple Tasks</div>
  <div class="feature-box">🔥 Smooth UI</div>
</div>

<div class="footer">© 2026 VelvetCash. All rights reserved.</div>

<div class="popup" id="popup"><div class="popup-box" id="popupContent"></div></div>

<script>
function showPopup(type) {
  const content = document.getElementById("popupContent");
  const modal = document.getElementById("popup");
  if(type === 'launch') content.innerHTML = "<h3>🚀 Launching!</h3><p>You can earn money from this app</p><button onclick='closePopup()'>DONE</button>";
  else if(type === 'about') content.innerHTML = "<h3>ℹ️ About</h3><p>This app is best for earning.</p><button onclick='closePopup()'>DONE</button>";
  else if(type === 'features') content.innerHTML = "<h3>✨ Features</h3><p>Fast payments aur rewards.</p><button onclick='closePopup()'>DONE</button>";
  else if(type === 'notify') content.innerHTML = "<h3>🔔 Notify</h3><p>The notification will be live comming soon</p><button onclick='closePopup()'>OK</button>";
  modal.style.display = "flex";
}
function closePopup() { document.getElementById("popup").style.display = "none"; }
</script>

</body>
</html>
